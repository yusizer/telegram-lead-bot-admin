<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Lead Bot Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f5f6f8; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { border:none; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,.07); }
  </style>
</head>
<body>
  <div class="card p-4 p-md-5" style="width:100%; max-width:400px;">
    <h4 class="text-center mb-1"><i class="bi bi-robot text-primary"></i> Lead Bot Admin</h4>
    <p class="text-center text-muted small mb-4">Войдите, чтобы смотреть заявки</p>
    {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" autofocus required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
