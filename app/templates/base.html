<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lead Bot Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f5f6f8; }
    .nav-brand { font-weight:700; letter-spacing:.3px; }
    .stat-card { border:none; border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .stat-value { font-size:2rem; font-weight:700; line-height:1; }
    .badge-new { background:#0d6efd; }
    .badge-contacted { background:#ffc107; color:#212529; }
    .badge-closed { background:#198754; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand bg-white border-bottom mb-4">
    <div class="container">
      <span class="navbar-brand nav-brand"><i class="bi bi-robot text-primary me-1"></i>Lead Bot Admin</span>
      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-sm btn-outline-secondary" href="/">Дашборд</a>
        <a class="btn btn-sm btn-outline-secondary" href="/leads">Заявки</a>
        <a class="btn btn-sm btn-outline-danger" href="/logout">Выйти</a>
      </div>
    </div>
  </nav>
  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
